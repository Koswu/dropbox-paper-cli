repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty-check
        name: ty (type check)
        entry: ty check --python .venv
        language: python
        types: [python]
        pass_filenames: false
        additional_dependencies: ["ty==0.0.31"]
